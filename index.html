<!DOCTYPE html>
<html>
<head>
    <title>Sorry Jan 💔</title>

    <!-- ✅ IMPORTANT FOR MOBILE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            color: white;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            width: 200%;
            height: 200%;
            background: linear-gradient(-45deg, #020617, #0f172a, #1e293b);
            background-size: 400% 400%;
            animation: bgMove 18s ease infinite;
            z-index: -2;
        }

        @keyframes bgMove {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        .box {
            width: 90%;
            max-width: 420px;
            padding: 30px;
            border-radius: 20px;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(25px);
            text-align: center;
        }

        h1 {
            font-size: clamp(28px, 6vw, 42px);
            color: white;
            text-shadow: 0 0 15px rgba(255,255,255,0.7);
        }

        .subtitle {
            font-size: clamp(13px, 3.5vw, 16px);
            opacity: 0.8;
            margin-bottom: 20px;
        }

        .heart-btn {
            width: clamp(90px, 25vw, 120px);
            height: clamp(90px, 25vw, 120px);
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: auto;
            position: relative;
            overflow: hidden;
        }

        .heart-btn span {
            font-size: clamp(28px, 8vw, 40px);
        }

        .fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 0%;
            background: linear-gradient(180deg, #fda4af, #f472b6);
        }

        /* 🌸 sakura */
        .leaf {
            position: fixed;
            top: -10px;
            color: #fda4af;
            animation: fall linear infinite;
            z-index: -1;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
            }
        }
    </style>
</head>

<body>

<div class="box">
    <h1>Sorry Jan ✨</h1>
    <div class="subtitle">Hold to accept apology 💞</div>

    <div class="heart-btn" id="btn">
        <div class="fill" id="fill"></div>
        <span>❤️</span>
    </div>
</div>

<script>
let progress = 0;
let interval;

const btn = document.getElementById("btn");
const fill = document.getElementById("fill");

function startHold(){
    interval = setInterval(() => {
        progress += 2;
        fill.style.height = progress + "%";

        if(progress >= 100){
            clearInterval(interval);
            document.body.style.opacity = "0";
            setTimeout(()=>{
                window.location.href = "love.html";
            },500);
        }
    }, 30);
}

function stopHold(){
    clearInterval(interval);
    progress = 0;
    fill.style.height = "0%";
}

btn.addEventListener("mousedown", startHold);
btn.addEventListener("mouseup", stopHold);
btn.addEventListener("mouseleave", stopHold);
btn.addEventListener("touchstart", startHold);
btn.addEventListener("touchend", stopHold);

/* 🌸 sakura */
setInterval(()=>{
    let leaf = document.createElement("div");
    leaf.className = "leaf";
    leaf.innerHTML = "🌸";
    leaf.style.left = Math.random()*100 + "vw";
    leaf.style.fontSize = (10 + Math.random()*15) + "px";
    leaf.style.animationDuration = (6 + Math.random()*5) + "s";

    document.body.appendChild(leaf);
    setTimeout(()=>leaf.remove(),12000);
}, 400);
</script>

</body>
</html>
