<!DOCTYPE html>
<html>
<head>
    <title>Sorry Jan 💔</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* 🌌 animated bg */
        body::before {
            content: "";
            position: fixed;
            width: 200%;
            height: 200%;
            background: linear-gradient(-45deg, #020617, #0f172a, #1e293b);
            background-size: 400% 400%;
            animation: bgMove 18s ease infinite;
            z-index: -2;
        }

        @keyframes bgMove {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        /* 💎 glass */
        .box {
            text-align: center;
            padding: 60px;
            border-radius: 25px;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 10px 50px rgba(0,0,0,0.4);
        }

        /* ✨ GLOW WHITE TEXT */
        h1 {
            font-size: 42px;
            margin-bottom: 25px;
            color: #ffffff;
            text-shadow: 
                0 0 10px rgba(255,255,255,0.8),
                0 0 20px rgba(255,255,255,0.6),
                0 0 40px rgba(255,255,255,0.4);
        }

        .subtitle {
            font-size: 15px;
            opacity: 0.8;
            margin-bottom: 25px;
        }

        /* ❤️ hold button */
        .heart-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: auto;
            position: relative;
            cursor: pointer;
            overflow: hidden;
        }

        .heart-btn span {
            font-size: 40px;
            z-index: 2;
        }

        .fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 0%;
            background: linear-gradient(180deg, #fda4af, #f472b6);
            transition: height 0.1s linear;
        }

        /* 🌸 sakura */
        .leaf {
            position: fixed;
            top: -10px;
            color: #fda4af;
            animation: fall linear infinite;
            z-index: -1;
        }

        @keyframes fall {
            0% {transform: translateY(-10vh) rotate(0deg);}
            100% {transform: translateY(110vh) rotate(360deg);}
        }
    </style>
</head>

<body>

<div class="box">
    <h1>Sorry Jan ✨</h1>
    <div class="subtitle">Hold to accept apology 💞</div>

    <div class="heart-btn" id="btn">
        <div class="fill" id="fill"></div>
        <span>❤️</span>
    </div>
</div>

<script>
let progress = 0;
let interval;

const btn = document.getElementById("btn");
const fill = document.getElementById("fill");

function startHold(){
    interval = setInterval(() => {
        progress += 2;
        fill.style.height = progress + "%";

        if(progress >= 100){
            clearInterval(interval);
            document.body.style.opacity = "0";
            setTimeout(()=>{
                window.location.href = "love.html";
            },500);
        }
    }, 30);
}

function stopHold(){
    clearInterval(interval);
    progress = 0;
    fill.style.height = "0%";
}

btn.addEventListener("mousedown", startHold);
btn.addEventListener("mouseup", stopHold);
btn.addEventListener("mouseleave", stopHold);
btn.addEventListener("touchstart", startHold);
btn.addEventListener("touchend", stopHold);

/* 🌸 sakura generator */
setInterval(()=>{
    let leaf = document.createElement("div");
    leaf.className = "leaf";
    leaf.innerHTML = "🌸";
    leaf.style.left = Math.random()*100 + "vw";
    leaf.style.fontSize = (12 + Math.random()*18) + "px";
    leaf.style.animationDuration = (5 + Math.random()*5) + "s";

    document.body.appendChild(leaf);

    setTimeout(()=>leaf.remove(),10000);
}, 300);
</script>

</body>
</html>
